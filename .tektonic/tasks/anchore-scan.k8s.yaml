apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-anchore-scan
  namespace: tektonic-ci
spec:
  params:
    - name: source-branch
      type: string
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - env:
        - name: CLOUDSDK_CONFIG
          value: /tekton/home/.config/gcloud
      image: ghcr.io/pfenerty/apko-cicd/gcloud:563.0.0
      name: restore-grype-db-cache
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let hash = ("" | hash sha256 | str substring 0..15)
        $hash | save -f /tekton/home/.cache-grype-db-hash

        let object = $"grype/($hash).tar.zst"
        let gcs_url = $"gs://tektonic-ci-cache/($object)"
        log $"restore-grype-db-cache: checking ($gcs_url)"

        let exists = ((^gcloud storage ls $gcs_url | complete).exit_code == 0)
        if $exists {
          let size = (
            ^gcloud storage ls -l $gcs_url
            | lines | first | str trim | split words | first | into int
          )
          log $"restore-grype-db-cache: hit ($hash) size=(($size / 1_000_000) | math round --precision 1)MB"
          let cache_paths = ["grype-db"]
          for p in $cache_paths {
            if ($p | path exists) { ^chmod -R u+w $p; rm -rf $p }
          }
          log "restore-grype-db-cache: downloading ..."
          let t0 = (date now)
          ^gcloud --verbosity=error storage cp $gcs_url - | ^zstd -d -T0 -c | ^tar xf - -o --no-same-permissions
          let elapsed = (((date now) - $t0) | into int) / 1_000_000_000
          let speed = (if $elapsed > 0 { ($size / 1_000_000) / $elapsed | math round --precision 1 } else { 0 })
          log $"restore-grype-db-cache: restored in ($elapsed)s ($speed) MB/s"
        } else {
          log $"restore-grype-db-cache: miss ($hash) — object not found in bucket"
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/syft:1.42.3
      name: generate-sbom
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] generate-sbom: ($msg)"
        }

        log "generating SBOM from package-lock.json"
        let start = (date now)

        ^syft file:package-lock.json -o cyclonedx-json=sbom.cyclonedx.json -o syft-table

        let elapsed = ((date now) - $start | into int) / 1_000_000_000
        log $"done in ($elapsed)s"

        if ("sbom.cyclonedx.json" | path exists) {
          let size = (ls sbom.cyclonedx.json | get size.0)
          log $"sbom size: ($size)"
        } else {
          log "warning: sbom.cyclonedx.json not found"
        }
    - env:
        - name: GRYPE_DB_CACHE_DIR
          value: $(workspaces.workspace.path)/grype-db
      image: ghcr.io/pfenerty/apko-cicd/grype:0.114.0
      name: scan
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] grype-scan: ($msg)"
        }

        log "scanning sbom.cyclonedx.json for vulnerabilities"
        let start = (date now)

        # Run grype directly so stdout/stderr stream in real time.
        # onError: continue prevents the step failure from stopping the pipeline;
        # the exit code is captured by the upload-sarif step via /tekton/steps/step-scan/exitCode.
        ^grype -v sbom:./sbom.cyclonedx.json -o sarif=./scan.sarif

        let elapsed = ((date now) - $start | into int) / 1_000_000_000
        log $"done in ($elapsed)s"

        if ("scan.sarif" | path exists) {
          let size = (ls scan.sarif | get size.0)
          log $"sarif size: ($size)"
        }
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: upload-sarif
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] upload-sarif: ($msg)"
        }

        # Capture grype exit code for status reporting
        let grype_ec = (try { open --raw /tekton/steps/step-scan/exitCode | str trim | into int } catch { 0 })
        $grype_ec | into string | save -f /tekton/home/.exit-code
        log $"grype exit-code: ($grype_ec)"

        if not ("scan.sarif" | path exists) or (ls scan.sarif | get size.0) == 0B {
          log "no sarif to upload, skipping"
          exit 0
        }

        let ref_raw = "$(params.source-branch)"
        let ref = if ($ref_raw | str starts-with "refs/") { $ref_raw } else { $"refs/heads/($ref_raw)" }
        log $"ref: ($ref)"

        # Base64-encode the gzipped SARIF
        let sarif_b64 = (open --raw scan.sarif | ^gzip -c | encode base64)
        log $"sarif payload: (($sarif_b64 | str length) / 1024 | math round)KB base64"

        let url = "https://api.github.com/repos/$(params.repo-full-name)/code-scanning/sarifs"
        let body = {
          commit_sha: "$(params.revision)",
          ref: $ref,
          sarif: $sarif_b64,
        }

        log $"POST ($url)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "uploaded"
        } catch { |e|
          log $"upload failed: ($e.msg)"
        }
    - env:
        - name: CLOUDSDK_CONFIG
          value: /tekton/home/.config/gcloud
      image: ghcr.io/pfenerty/apko-cicd/gcloud:563.0.0
      name: save-grype-db-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let hash = (try { open --raw /tekton/home/.cache-grype-db-hash | str trim } catch { "" })
        if ($hash | is-empty) { log "save-grype-db-cache: no hash, skipping"; exit 0 }

        let object = $"grype/($hash).tar.zst"
        let gcs_url = $"gs://tektonic-ci-cache/($object)"

        let paths = ["grype-db"] | where { |p| ($p | path exists) }
        if ($paths | is-empty) { log "save-grype-db-cache: no paths to cache"; exit 0 }

        for p in $paths { ^chmod -R u+w $p }

        let max = 1
        if $max > 0 {
          let entries = (try {
            ^gcloud storage ls -l $"gs://tektonic-ci-cache/grype/*.tar.zst"
            | lines
            | where { |l| $l | str ends-with ".tar.zst" }
            | each { |l|
                let parts = ($l | str trim | split row -r '\s+')
                { url: ($parts | last), created: ($parts | get 1) }
              }
            | sort-by created | reverse | skip $max
          } catch { [] })
          for e in $entries {
            let result = (^gcloud storage rm $e.url | complete)
            if $result.exit_code == 0 {
              log $"save-grype-db-cache: evicted ($e.url)"
            } else {
              log $"save-grype-db-cache: warn: failed to evict ($e.url): ($result.stderr)"
            }
          }
        }

        let uncompressed = ($paths | each { |p| try { du $p | get apparent.0 | into int } catch { 0 } } | math sum)
        log $"save-grype-db-cache: compressing (($uncompressed / 1_000_000) | math round --precision 1)MB ..."
        let tmp = $"$(workspaces.workspace.path)/cache-($hash).tar.zst"
        let t0 = (date now)
        ^tar cf - ...$paths | ^zstd -3 -T0 -f -o $tmp
        let compress_elapsed = (((date now) - $t0) | into int) / 1_000_000_000
        let compressed = (ls $tmp | get size.0 | into int)
        let ratio = (if $compressed > 0 { $uncompressed / $compressed | math round --precision 1 } else { 0 })
        log $"save-grype-db-cache: compressed to (($compressed / 1_000_000) | math round --precision 1)MB ratio=($ratio)x in ($compress_elapsed)s"

        log "save-grype-db-cache: uploading ..."
        let t1 = (date now)
        ^gcloud storage cp $tmp $gcs_url
        rm $tmp
        let upload_elapsed = (((date now) - $t1) | into int) / 1_000_000_000
        let speed = (if $upload_elapsed > 0 { ($compressed / 1_000_000) / $upload_elapsed | math round --precision 1 } else { 0 })
        log $"save-grype-db-cache: uploaded ($gcs_url) in ($upload_elapsed)s ($speed) MB/s"
      workingDir: $(workspaces.workspace.path)
    - env: []
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [anchore-scan]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "anchore-scan", description: $desc }

        log $"report-status [anchore-scan]: POST ($url)"
        log $"report-status [anchore-scan]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [anchore-scan]: done"
        } catch { |e|
          log $"report-status [anchore-scan]: error: ($e.msg)"
        }
        exit $exit_code
  workspaces:
    - name: workspace
