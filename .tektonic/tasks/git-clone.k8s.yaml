apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-git-clone
  namespace: tektonic-ci
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
  results:
    - description: Full commit SHA
      name: commit
      type: string
    - description: Abbreviated commit SHA
      name: short-sha
      type: string
    - description: Checked-out branch/revision
      name: branch
      type: string
    - description: Commit subject line
      name: commit-message
      type: string
    - description: Commit author name
      name: author-name
      type: string
    - description: Commit author email
      name: author-email
      type: string
    - description: Author timestamp (ISO 8601)
      name: timestamp
      type: string
    - description: Repository remote URL
      name: remote-url
      type: string
    - description: Repository URL fetched (Tekton Chains provenance material)
      name: CHAINS-GIT_URL
      type: string
    - description: Commit SHA fetched (Tekton Chains provenance material)
      name: CHAINS-GIT_COMMIT
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  steps:
    - env:
        - name: GIT_CONFIG_GLOBAL
          value: $(workspaces.workspace.path)/.gitconfig
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: clone
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        set -e
        # Mark workspace as safe before any git operations that check directory ownership.
        # The workspace dir may be owned by root (local-path provisioner) while the pod
        # runs as a non-root uid; git 2.35.2+ rejects such repos without this config.
        git config --global --add safe.directory $(workspaces.workspace.path)
        git init -b main .
        git remote add origin $(params.url)
        # Fetch only the target branch. GitHub doesn't allow fetching by arbitrary SHA,
        # but the revision is always a branch tip in CI (push/PR events). Fetching a
        # single branch avoids wildcard-refspec pack issues in newer git versions.
        git fetch --depth=1 origin $(params.revision)
        git checkout -b $(params.revision) FETCH_HEAD

        # Write git metadata as Tekton results for downstream tasks.
        git rev-parse HEAD          | tr -d '\n' > $(results.commit.path)
        git rev-parse --short HEAD  | tr -d '\n' > $(results.short-sha.path)
        git log -1 --format=%s      | tr -d '\n' > $(results.commit-message.path)
        git log -1 --format=%an     | tr -d '\n' > $(results.author-name.path)
        git log -1 --format=%ae     | tr -d '\n' > $(results.author-email.path)
        git log -1 --format=%aI     | tr -d '\n' > $(results.timestamp.path)
        printf '%s' "$(params.revision)" > $(results.branch.path)
        printf '%s' "$(params.url)" > $(results.remote-url.path)
        git rev-parse HEAD | tr -d '\n' > $(results.CHAINS-GIT_COMMIT.path)
        printf '%s' "$(params.url)" > $(results.CHAINS-GIT_URL.path)
      workingDir: $(workspaces.workspace.path)
  workspaces:
    - name: workspace
