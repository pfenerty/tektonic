apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-test-npm
  namespace: tektonic-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - env:
        - name: CLOUDSDK_CONFIG
          value: /tekton/home/.config/gcloud
      image: ghcr.io/pfenerty/apko-cicd/gcloud:563.0.0
      name: restore-npm-cache
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let hash = (
          ["package-lock.json"]
          | each { |f| if ($f | path exists) { open --raw $f } else { "" } }
          | str join | hash sha256 | str substring 0..15
        )
        $hash | save -f /tekton/home/.cache-npm-hash

        let object = $"npm/($hash).tar.zst"
        let gcs_url = $"gs://tektonic-ci-cache/($object)"
        log $"restore-npm-cache: checking ($gcs_url)"

        let exists = ((^gcloud storage ls $gcs_url | complete).exit_code == 0)
        if $exists {
          let size = (
            ^gcloud storage ls -l $gcs_url
            | lines | first | str trim | split words | first | into int
          )
          log $"restore-npm-cache: hit ($hash) size=(($size / 1_000_000) | math round --precision 1)MB"
          let cache_paths = ["node_modules"]
          for p in $cache_paths {
            if ($p | path exists) { ^chmod -R u+w $p; rm -rf $p }
          }
          log "restore-npm-cache: downloading ..."
          let t0 = (date now)
          ^gcloud --verbosity=error storage cp $gcs_url - | ^zstd -d -T0 -c | ^tar xf - -o --no-same-permissions
          let elapsed = (((date now) - $t0) | into int) / 1_000_000_000
          let speed = (if $elapsed > 0 { ($size / 1_000_000) / $elapsed | math round --precision 1 } else { 0 })
          log $"restore-npm-cache: restored in ($elapsed)s ($speed) MB/s"
        } else {
          log $"restore-npm-cache: miss ($hash) — object not found in bucket"
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/nodejs:22
      name: test
      onError: continue
      script: |-
        #!/bin/sh
        [ ! -d node_modules ] && npm ci
        npm test; EC=$?; echo $EC > /tekton/home/.exit-code; exit $EC
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: CLOUDSDK_CONFIG
          value: /tekton/home/.config/gcloud
      image: ghcr.io/pfenerty/apko-cicd/gcloud:563.0.0
      name: save-npm-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let hash = (try { open --raw /tekton/home/.cache-npm-hash | str trim } catch { "" })
        if ($hash | is-empty) { log "save-npm-cache: no hash, skipping"; exit 0 }

        let object = $"npm/($hash).tar.zst"
        let gcs_url = $"gs://tektonic-ci-cache/($object)"
        let already_exists = ((^gcloud storage ls $gcs_url | complete).exit_code == 0)
        if $already_exists { log $"save-npm-cache: ($hash) exists, skipping"; exit 0 }

        let paths = ["node_modules"] | where { |p| ($p | path exists) }
        if ($paths | is-empty) { log "save-npm-cache: no paths to cache"; exit 0 }

        for p in $paths { ^chmod -R u+w $p }

        let max = 3
        if $max > 0 {
          let entries = (try {
            ^gcloud storage ls -l $"gs://tektonic-ci-cache/npm/*.tar.zst"
            | lines
            | where { |l| $l | str ends-with ".tar.zst" }
            | each { |l|
                let parts = ($l | str trim | split row -r '\s+')
                { url: ($parts | last), created: ($parts | get 1) }
              }
            | sort-by created | reverse | skip $max
          } catch { [] })
          for e in $entries {
            let result = (^gcloud storage rm $e.url | complete)
            if $result.exit_code == 0 {
              log $"save-npm-cache: evicted ($e.url)"
            } else {
              log $"save-npm-cache: warn: failed to evict ($e.url): ($result.stderr)"
            }
          }
        }

        let uncompressed = ($paths | each { |p| try { du $p | get apparent.0 | into int } catch { 0 } } | math sum)
        log $"save-npm-cache: compressing (($uncompressed / 1_000_000) | math round --precision 1)MB ..."
        let tmp = $"$(workspaces.workspace.path)/cache-($hash).tar.zst"
        let t0 = (date now)
        ^tar cf - ...$paths | ^zstd -3 -T0 -o $tmp
        let compress_elapsed = (((date now) - $t0) | into int) / 1_000_000_000
        let compressed = (ls $tmp | get size.0 | into int)
        let ratio = (if $compressed > 0 { $uncompressed / $compressed | math round --precision 1 } else { 0 })
        log $"save-npm-cache: compressed to (($compressed / 1_000_000) | math round --precision 1)MB ratio=($ratio)x in ($compress_elapsed)s"

        log "save-npm-cache: uploading ..."
        let t1 = (date now)
        ^gcloud storage cp $tmp $gcs_url
        rm $tmp
        let upload_elapsed = (((date now) - $t1) | into int) / 1_000_000_000
        let speed = (if $upload_elapsed > 0 { ($compressed / 1_000_000) / $upload_elapsed | math round --precision 1 } else { 0 })
        log $"save-npm-cache: uploaded ($gcs_url) in ($upload_elapsed)s ($speed) MB/s"
      workingDir: $(workspaces.workspace.path)
    - env: []
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [test-npm]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "test-npm", description: $desc }

        log $"report-status [test-npm]: POST ($url)"
        log $"report-status [test-npm]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [test-npm]: done"
        } catch { |e|
          log $"report-status [test-npm]: error: ($e.msg)"
        }
        exit $exit_code
  workspaces:
    - name: workspace
